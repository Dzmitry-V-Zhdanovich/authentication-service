spring:
  profiles:
    active: local
  application:
    name: authentication-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authentication_service_db}
    username: ${DB_USER:javauser}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      pool-name: UserServiceHikariPool

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false
    default-schema: public
    contexts: development

  jwt:
    secret: "mySuperSecretKeyForJWTGenerationThatIsLongEnoughForHS256AndMoreSecure12345"
    access:
      expiration: 900000  # 15 минут
    refresh:
      expiration: 604800000

  user:
    service:
      url: http://localhost:8081

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
      client-type: lettuce

  cache:
    type: none

server:
  port: 8082

logging:
  level:
    liquibase: INFO
    com.zaxxer.hikari: DEBUG
    com.innowise.authenticationservice: DEBUG

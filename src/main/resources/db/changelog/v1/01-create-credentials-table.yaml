databaseChangeLog:
  - changeSet:
      id: 1
      author: Dmitry
      labels: create-table
      comment: "Create credentials table"
      changes:
        - createTable:
            tableName: credentials
            remarks: "Table for storing user credentials (login/password hash) for authentication"
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: "Primary key"
              - column:
                  name: login
                  type: VARCHAR(100)
                  constraints:
                    unique: true
                    nullable: false
                  remarks: "Unique login name"
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                  remarks: "BCrypt password hash with salt"
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                  remarks: "User role: ROLE_USER or ROLE_ADMIN"
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                  remarks: "Reference to UserService user ID"
      rollback:
        - dropTable:
            tableName: credentials
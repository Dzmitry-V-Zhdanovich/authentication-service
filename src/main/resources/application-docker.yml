spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:authentication_service_db}
    username: ${DB_USERNAME:javauser}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver

server:
  port: 8082

logging:
  level:
    com.innowise.authenticationservice: INFO